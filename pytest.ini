[pytest]
# pytest の設定ファイル

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# テスト失敗時により詳細な情報を表示
addopts = 
    -v
    --tb=short
    --strict-markers

# カバレッジの設定
[coverage:run]
source = .
omit =
    .venv/*
    tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
